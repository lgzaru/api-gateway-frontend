<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1010 Platform — Unified Services</title>
    <!-- Prevent flash of white before React mounts and ThemeContext runs -->
    <style>
      html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
      html[data-theme="dark"], html[data-theme="dark"] body { background: #060a14; }
      html:not([data-theme="dark"]), html:not([data-theme="dark"]) body { background: #f3f5fb; }
    </style>
    <script>
      (function () {
        var t = localStorage.getItem('pus_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
